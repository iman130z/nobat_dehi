

<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <title>ورود</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #eef2f7; font-family: Tahoma, Arial; direction: rtl; padding-top: 50px; }
        .form-container { max-width: 400px; margin: auto; background: white; padding: 30px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); }
        .btn-submit { background: linear-gradient(135deg, #28a745, #20c997); border: none; border-radius: 30px; padding: 12px; width: 100%; color: white; font-weight: bold; }
    </style>
</head>
<body>
    <div class="form-container">
        <h1 class="text-center">🔐 ورود</h1>
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-submit">ورود</button>
        </form>
        <p class="mt-3 text-center">حساب نداری؟ <a href="{% url 'signup' %}">ثبت‌نام کن</a></p>
    </div>
</body>
</html>
