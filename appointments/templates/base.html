

<!DOCTYPE html>
<html lang="fa">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}سیستم نوبت‌دهی{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        body {
            background: url('/static/background.jpg') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Vazir', Tahoma, Arial, sans-serif;
            direction: rtl;
            padding-top: 80px; /* فاصله از بالا برای هدر ثابت */
            margin: 0;
            min-height: 100vh;
            position: relative;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.8);
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
        }

        /* استایل هدر */
        .custom-navbar {
            background: linear-gradient(135deg, #007bff, #00b4d8);
            padding: 10px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            direction: rtl;
        }

        .custom-navbar .navbar-brand {
            color: white;
            font-weight: bold;
            font-size: 1.5rem;
        }

        .custom-navbar .navbar-brand i {
            margin-left: 10px;
        }

        .custom-navbar .nav-link {
            color: white !important;
            font-weight: 500;
            margin: 0 10px;
            transition: 0.3s;
        }

        .custom-navbar .nav-link:hover {
            transform: scale(1.05);
            color: #f8f9fa !important;
        }

        .custom-navbar .btn-outline-light {
            border-radius: 30px;
            padding: 5px 20px;
            font-weight: 500;
        }

        .custom-navbar .btn-outline-light:hover {
            background: white;
            color: #007bff;
        }

        .custom-navbar .dropdown-menu {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .custom-navbar .dropdown-item:hover {
            background: #e3f2fd;
        }

        /* برای تنظیم فاصله محتوا با هدر */
        .content {
            padding-top: 20px;
        }
    </style>
</head>
<body>
    <!-- هدر -->
    <nav class="navbar navbar-expand-lg custom-navbar fixed-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="/">
                <i class="fas fa-calendar-check"></i> سیستم نوبت‌دهی
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item">
                        <a class="nav-link active" href="/"><i class="fas fa-home"></i> خانه</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/book/"><i class="fas fa-plus-circle"></i> ثبت نوبت</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    {% if user.is_authenticated %}
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown">
                                <i class="fas fa-user-circle"></i> {{ user.username }}
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" href="#"><i class="fas fa-user"></i> پروفایل</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" href="{% url 'logout' %}"><i class="fas fa-sign-out-alt"></i> خروج</a></li>
                            </ul>
                        </li>
                    {% else %}
                        <li class="nav-item">
                            <a class="nav-link" href="{% url 'login' %}"><i class="fas fa-sign-in-alt"></i> ورود</a>
                        </li>
                        <li class="nav-item">
                            <a class="btn btn-outline-light ms-2" href="{% url 'signup' %}"><i class="fas fa-user-plus"></i> ثبت‌نام</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <!-- محتوای صفحات -->
    <div class="container content">
        {% block content %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
